model:
  name: "FraudMLP"
  type: "pytorch"
  input_dim: 141  # Confirmed via metadata.yaml
  hidden_dims: [512, 256, 128]
  dropout: 0.3
  activation: "relu"
  use_batchnorm: true

training:
  batch_size: 1024
  epochs: 100
  learning_rate: 0.001
  weight_decay: 1e-5
  early_stopping_patience: 10

loss_params:
  type: "focal"   # or "wbce" for baseline tests
  focal:
    alpha: 0.8    # Tunable via Optuna
    gamma: 2.0    # Tunable via Optuna
  wbce:
    pos_weight: 32.0 # ~97/3 ratio
