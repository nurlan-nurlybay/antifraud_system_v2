model:
  name: "FraudLSTM"
  type: "pytorch"
  input_dim: 141  # Features per timestep (from metadata.yaml)
  hidden_dim: 128
  num_layers: 2
  dropout: 0.3
  bidirectional: false

training:
  batch_size: 512  # Smaller than MLP due to 3D sequence memory
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1e-5
  early_stopping_patience: 8

loss_params:
  type: "focal"
  focal:
    alpha: 0.8
    gamma: 2.0
  wbce:
    pos_weight: 32.0
