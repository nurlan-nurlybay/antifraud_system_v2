xgboost:
  enabled: true
  # Note: Uses X_y_dev_tree.npz (433 features)
  params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    scale_pos_weight: 32.0  # XGBoost's native equivalent to WBCE
    pred_leaf: true 

lightgbm:
  enabled: true
  params:
    n_estimators: 200
    num_leaves: 31
    learning_rate: 0.05
    boosting_type: "gbdt"
    scale_pos_weight: 32.0
    pred_leaf: true

random_forest:
  enabled: true
  params:
    n_estimators: 100
    max_depth: 10
    n_jobs: -1
    class_weight: "balanced"
    return_leaves: true

embeddings:
  # Dimension of the vector representing a single leaf node in the Stacker
  leaf_embedding_dim: 4
