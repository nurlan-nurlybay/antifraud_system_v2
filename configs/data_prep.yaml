# ==============================================================================
# IEEE-CIS Fraud Detection: Data Preprocessing Configuration (v2.0)
# Strategy: Chronological Blending with Hybrid Dimensionality Reduction
# ==============================================================================

paths:
  train_transaction: "data/raw/train_transaction.csv"
  train_identity: "data/raw/train_identity.csv"
  processed_dir: "data/processed"

data:
  val_size: 0.10
  test_size: 0.10
  target_col: "isFraud"
  time_col: "TransactionDT"
  amount_col: "TransactionAmt"
  sequence_length: 5 

features:
  # Mathematically proven via dual-correlation (raw + missingness) that no features 
  # meet the >85% null AND <1% signal threshold. We keep everything.
  drop_features: []

  uid_columns: 
    - "card1"
    - "card2"
    - "card3"
    - "card4"
    - "card5"
    - "card6"
    - "addr1"
    - "P_emaildomain"

  categorical:
    target_encoding:
      enabled: true
      k: 5
      m: 10
    frequency_encoding:
      enabled: true
    columns:
      - "DeviceInfo"
      - "DeviceType"
      - "M1"
      - "M2"
      - "M3"
      - "M4"
      - "M5"
      - "M6"
      - "M7"
      - "M8"
      - "M9"
      - "P_emaildomain"
      - "ProductCD"
      - "R_emaildomain"
      - "addr1"
      - "addr2"
      - "card4"
      - "card6"
      - "id_12"
      - "id_15"
      - "id_16"
      - "id_23"
      - "id_27"
      - "id_28"
      - "id_29"
      - "id_30"
      - "id_31"
      - "id_33"
      - "id_34"
      - "id_35"
      - "id_36"
      - "id_37"
      - "id_38"

  reduce_v_features: true
  v_features_pca_dims: 2 # Locked: Captures 99.34% Variance based on Scree Plot
  
  # Imputation handles dynamically in preprocessing.py: 
  # Trees = -999, Neural = Median + Binary Mask
  impute_categoricals: "Unknown"
  log_transform_amount: true

metadata:
  project_version: "v2.0"
  dataset: "IEEE-CIS"
  strategy: "Hybrid Ensemble with Chronological Blending"
